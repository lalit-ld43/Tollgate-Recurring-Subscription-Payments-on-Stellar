name: Deploy to Testnet

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli

      - name: Build and Optimize Contracts
        run: |
          cargo build --target wasm32v1-none --release
          stellar contract optimize --wasm target/wasm32v1-none/release/billing.wasm
          stellar contract optimize --wasm target/wasm32v1-none/release/subscription.wasm

      - name: Deploy and Initialize Contracts
        run: |
          stellar keys generate deployer --network testnet
          stellar keys generate subscriber --network testnet
          stellar keys fund deployer --network testnet
          stellar keys fund subscriber --network testnet
          # Deploy Billing with Retry
          echo "Deploying Billing Contract..."
          for i in 1 2 3 4 5; do
            BILLING_ID=$(stellar contract deploy --wasm target/wasm32v1-none/release/billing.optimized.wasm --source deployer --network testnet) && break
            echo "Deploy failed, retrying in 10s..."
            sleep 10
          done
          echo "BILLING_ID=$BILLING_ID" >> $GITHUB_ENV
          
          # Initialize Billing with Retry
          echo "Initializing Billing Contract..."
          for i in 1 2 3 4 5; do
            stellar contract invoke --id $BILLING_ID --source deployer --network testnet -- initialize --admin $(stellar keys address deployer) && break
            echo "Invoke failed, retrying in 10s..."
            sleep 10
          done
          
          # Deploy Subscription with Retry
          echo "Deploying Subscription Contract..."
          for i in 1 2 3 4 5; do
            SUBSCRIPTION_ID=$(stellar contract deploy --wasm target/wasm32v1-none/release/subscription.optimized.wasm --source deployer --network testnet) && break
            echo "Deploy failed, retrying in 10s..."
            sleep 10
          done
          echo "SUBSCRIPTION_ID=$SUBSCRIPTION_ID" >> $GITHUB_ENV
          
          # Initialize Subscription with Retry
          echo "Initializing Subscription Contract..."
          for i in 1 2 3 4 5; do
            stellar contract invoke --id $SUBSCRIPTION_ID --source deployer --network testnet -- initialize --admin $(stellar keys address deployer) --billing_contract $BILLING_ID && break
            echo "Invoke failed, retrying in 10s..."
            sleep 10
          done
          
          # Fetch Native Token ID
          TOKEN_ID=$(stellar contract id asset --asset native --network testnet)
          echo "TOKEN_ID=$TOKEN_ID" >> $GITHUB_ENV
          
          # Create Plan
          stellar contract invoke --id $SUBSCRIPTION_ID --source deployer --network testnet -- create_plan --merchant $(stellar keys address deployer) --token $TOKEN_ID --price 1000000000 --period_seconds 2592000 --name "Pro Monthly"
          
          # Subscribe
          TX_HASH=$(stellar contract invoke --id $SUBSCRIPTION_ID --source subscriber --network testnet -- subscribe --subscriber $(stellar keys address subscriber) --plan_id 0 2>&1 | grep -o 'hash: [0-9a-fA-F]*' | awk '{print $2}')

      - name: Output Deployment Details
        run: |
          echo "### Deployment Successful 🚀" >> $GITHUB_STEP_SUMMARY
          echo "**Billing Contract ID:** \`$BILLING_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "**Subscription Contract ID:** \`$SUBSCRIPTION_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "**Token Contract ID:** \`$TOKEN_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "You can copy these IDs directly into your README.md!" >> $GITHUB_STEP_SUMMARY
